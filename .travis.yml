language: python
python:
  - "2.7"
  - "3.0"
  - "3.1"
  - "3.2"
  - "3.3"
  - "3.4"
  - "3.5"
  - "3.6"
  - "pypy"
# command to install dependencies
install:
  - pip install .
  - pip install coveralls
# command to run tests
script:
  - python setup.py test
  - coverage run setup.py test
after_success: coveralls
